title: "Srijit Mukherjee's Blog"
author: "Srijit Mukherjee"
logo: ""

execute:
  execute_notebooks: "off"

html:
  use_edit_page_button: false
  use_repository_button: false
  use_issues_button: false
  extra_navbar: ""
  home_page_in_navbar: true
  baseurl: "/blog"
  comments:
    giscus:
      repo: "mukherjeesrijit/mukherjeesrijit.github.io"
      repo_id: "YOUR_REPO_ID"
      category: "Announcements"
      category_id: "YOUR_CATEGORY_ID"

repository:
  url: https://github.com/mukherjeesrijit/mukherjeesrijit.github.io

sphinx:
  extra_extensions:
    - sphinx_tabs.tabs
  config:
    html_theme: furo
    mathjax_path: https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
    html_show_sphinx: false
    copyright: "2026, Srijit Mukherjee"
    html_theme_options:
      footer_icons: []